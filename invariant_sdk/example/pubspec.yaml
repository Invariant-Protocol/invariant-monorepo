name: invariant_app
version: 0.1.0
description: "Demonstrates how to use the invariant_sdk plugin."
publish_to: 'none'

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  invariant_sdk:
    path: ../
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.1.0  # 🛡️ Added for env var injection

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env # 🛡️ Declare the .env file as an asset