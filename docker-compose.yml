# docker-compose.yml

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: invariant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d invariant"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: postgres -c shared_buffers=128MB -c max_connections=75

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.release
    restart: always
    
    # 🛡️ INJECT ENVIRONMENT VARIABLES
    # This loads the .env file that was uploaded via your deploy script
    # and makes ADMIN_API_SECRET available to the Rust binary.
    env_file:
      - .env

    volumes:
      - /home/ubuntu/firebase_credentials.json:/app/firebase_credentials.json:ro
      - /home/ubuntu/certs:/app/certs:ro

    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@db:5432/invariant
      REDIS_URL: redis://redis:6379
      
      RUST_LOG: invariant_server=info,tower_http=info
      INVARIANT_NETWORK: testnet 
      INVARIANT_GENESIS_VERSION: 1
      
      FIREBASE_SERVICE_ACCOUNT_PATH: /app/firebase_credentials.json
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}

    ports:
      - "8443:8443"
    
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

volumes:
  postgres_data: